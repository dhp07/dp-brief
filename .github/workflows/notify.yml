name: DP Brief notify
on:
  push:
    branches: [main]
    paths: ['editions.json']
  schedule:
    - cron: '30 11 * * *'   # ~7:30am ET backstop (morning)
    - cron: '30 22 * * *'   # ~6:30pm ET backstop (evening)
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: notify
  cancel-in-progress: false
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pywebpush
      - name: Send push notification
        env:
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
        run: |
          printf '%s' "$VAPID_PRIVATE" > vapid_private.pem
          printf '%s' "$PUSH_SUBSCRIPTION" > subscription.json
          python3 push_notify.py
      - name: Record notification state
        if: always()
        run: |
          git config user.name "notify-bot"
          git config user.email "notify@users.noreply.github.com"
          git add .notify_state 2>/dev/null || true
          git commit -m "record notify state [skip ci]" 2>/dev/null && git push || echo "no state change to record"
