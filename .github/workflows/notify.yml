name: Notify on new edition
on:
  push:
    branches: [main]
    paths: ['editions.json']
  workflow_dispatch:
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pywebpush
      - name: Send push notification
        env:
          VAPID_PRIVATE: ${{ secrets.VAPID_PRIVATE }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
        run: |
          printf '%s' "$VAPID_PRIVATE" > vapid_private.pem
          printf '%s' "$PUSH_SUBSCRIPTION" > subscription.json
          python3 push_notify.py
